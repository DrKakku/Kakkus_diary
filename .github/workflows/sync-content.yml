name: Sync from Obsidian

on:
  repository_dispatch:
    types: [obsidian-sync]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sync publish folder from Obsidian
        env:
          OBSIDIAN_PAT: ${{ secrets.OBSIDIAN_PAT }}
        run: |
          set -euo pipefail

          rm -rf /tmp/obsidian-vault
          git clone --depth 1 --branch main "https://DrKakku:${OBSIDIAN_PAT}@github.com/DrKakku/obsidian-repo.git" /tmp/obsidian-vault

          SOURCE="/tmp/obsidian-vault/publish"
          DEST="src/content/imported"

          if [ ! -d "$SOURCE" ]; then
            echo "publish folder not found in Obsidian repo"
            exit 1
          fi

          mkdir -p "$DEST"
          rsync -av --delete "$SOURCE"/ "$DEST"/

      - name: Commit synced content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync content from Obsidian"
          file_pattern: "src/content/imported/**"
          skip_dirty_check: false

      - name: Trigger deploy workflow explicitly
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          set -euo pipefail

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${WORKFLOW_PAT}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'

  build:
      runs-on: ubuntu-latest
  
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4
  
        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "22"
            cache: npm
  
        - name: Install dependencies
          run: npm ci
  
        - name: Build site
          run: npm run build
  
        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
