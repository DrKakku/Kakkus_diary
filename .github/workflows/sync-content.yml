name: Sync Content from Obsidian Vault

on:
  push:
    branches:
      - main
    paths:
      - "publish/**"
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    env:
      OBSIDIAN_REPO: "https://github.com/DrKakku/obsidian-repo.git"
      OBSIDIAN_BRANCH: "main"
      OBSIDIAN_FOLDER: "publish"

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup SSH for secure repo access
        run: |
          # Create SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Accept GitHub's SSH host key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "✅ SSH setup ready"

      - name: Pre-sync security validation
        run: |
          echo "🔐 Running pre-sync security checks..."
          
          # Define sensitive patterns to block
          BLOCKED_PATTERNS=(
            "\.env"
            "\.secret"
            "password"
            "api_key"
            "token"
            "private"
            "auth"
            "credentials"
          )
          
          # Temporary directory for cloning
          TEMP_REPO="/tmp/obsidian-vault-check"
          
          # Clone with PAT authentication (hidden in logs)
          mkdir -p "$TEMP_REPO"
          
          # Build authenticated URL
          REPO_WITH_AUTH="https://DrKakku:${{ secrets.OBSIDIAN_PAT }}@github.com/DrKakku/obsidian-repo.git"
          
          git clone --depth 1 --branch "$OBSIDIAN_BRANCH" "$REPO_WITH_AUTH" "$TEMP_REPO" 2>/dev/null || {
            echo "⚠️ Could not validate remote repo structure. Proceeding with caution..."
            exit 0
          }
          
          # Check that publish/ folder exists
          if [ ! -d "$TEMP_REPO/$OBSIDIAN_FOLDER" ]; then
            echo "❌ ERROR: publish/ folder not found in Obsidian repo!"
            exit 1
          fi
          
          echo "✅ publish/ folder found"
          
          # Check for sensitive files in publish/ folder (should never be there)
          FOUND_SENSITIVE=0
          for pattern in "${BLOCKED_PATTERNS[@]}"; do
            if find "$TEMP_REPO/$OBSIDIAN_FOLDER" -iname "*$pattern*" 2>/dev/null | grep -q .; then
              echo "⚠️ Warning: Found files matching '$pattern' in publish/ folder"
              echo "  These will be synced. Please check your Obsidian vault!"
              ((FOUND_SENSITIVE++))
            fi
          done

          
          # Confirm private/ folder exists and is NOT in publish/
          if [ -d "$TEMP_REPO/private" ]; then
            echo "✅ private/ folder confirmed as separate"
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Security Check Summary:"
          echo "  ✅ Syncing from: $OBSIDIAN_FOLDER/"
          echo "  ✅ publish/ folder: EXISTS"
          echo "  ✅ private/ folder: PROTECTED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Clean up temporary clone
          rm -rf "$TEMP_REPO"

      - name: Sync content from Obsidian vault
        run: |
          # This step will:
          # 1. Clone or pull the Obsidian repo using PAT
          # 2. Copy the publish/ folder to src/content/imported/
          # 3. Preserve folder structure exactly
          # 4. Explicitly BLOCK private/ folder
          
          echo "📂 Syncing content from Obsidian vault..."
          
          # Build authenticated URL
          REPO_WITH_AUTH="https://DrKakku:${{ secrets.OBSIDIAN_PAT }}@github.com/DrKakku/obsidian-repo.git"
          
          # Clone or update Obsidian repo
          if [ -d "/tmp/obsidian-vault" ]; then
            echo "Updating existing Obsidian repo..."
            cd /tmp/obsidian-vault
            git pull origin "$OBSIDIAN_BRANCH"
          else
            echo "Cloning Obsidian repo..."
            git clone --depth 1 --branch "$OBSIDIAN_BRANCH" "$REPO_WITH_AUTH" /tmp/obsidian-vault
          fi
          
          cd - > /dev/null
          
          # Verify source folder exists
          SOURCE_FOLDER="/tmp/obsidian-vault/$OBSIDIAN_FOLDER"
          if [ ! -d "$SOURCE_FOLDER" ]; then
            echo "❌ ERROR: Source folder $OBSIDIAN_FOLDER not found!"
            exit 1
          fi
          
          # Create imported directory
          mkdir -p src/content/imported
          
          # Remove old content (clean slate)
          if [ -d "src/content/imported" ] && [ -n "$(ls -A src/content/imported)" ]; then
            echo "Cleaning old content..."
            rm -rf src/content/imported/*
          fi
          
          # Explicitly copy ONLY from publish/ folder
          echo "Copying publish/ folder..."
          cp -r "$SOURCE_FOLDER"/* src/content/imported/ || {
            echo "⚠️ Warning: publish folder is empty or doesn't exist"
          }
          
          # SECURITY: Verify NO private files were synced
          echo ""
          echo "🔐 Verifying no private files were synced..."
          
          PRIVATE_PATTERNS=(
            "private/"
            ".env"
            ".secret"
            "password"
            "api_key"
            "token"
            "credentials"
          )
          
          FOUND_PRIVATE=0
          for pattern in "${PRIVATE_PATTERNS[@]}"; do
            if find src/content/imported -iname "*${pattern}*" 2>/dev/null | grep -q .; then
              echo "❌ ERROR: Found private pattern '$pattern' in synced content!"
              find src/content/imported -iname "*${pattern}*"
              ((FOUND_PRIVATE++))
            fi
          done
          
          if [ $FOUND_PRIVATE -gt 0 ]; then
            echo "❌ Safety check failed: Private files detected!"
            exit 1
          fi
          
          echo "✅ Safety check passed: No private files detected"
          
          # Count synced files
          TOTAL_FILES=$(find src/content/imported -type f | wc -l)
          MARKDOWN_FILES=$(find src/content/imported -type f -name "*.md" | wc -l)
          
          echo ""
          echo "✅ Sync complete!"
          echo "  Total files: $TOTAL_FILES"
          echo "  Markdown files: $MARKDOWN_FILES"

      - name: Verify sync integrity
        run: |
          echo "🔍 Verifying synced content..."
          
          IMPORT_DIR="src/content/imported"
          ERRORS=0
          WARNINGS=0
          
          # Check if import directory exists and has content
          if [ ! -d "$IMPORT_DIR" ] || [ -z "$(ls -A "$IMPORT_DIR")" ]; then
            echo "⚠️ Warning: No content imported. Publish folder may be empty."
            ((WARNINGS++))
          fi
          
          # Validate markdown files
          echo ""
          echo "📋 Validating markdown files..."
          while IFS= read -r -d '' markdown_file; do
            # Extract filename
            rel_path="${markdown_file#"$IMPORT_DIR/"}"
            
            # Check for required frontmatter fields
            if grep -q "^---" "$markdown_file"; then
              # Extract frontmatter
              frontmatter=$(sed -n '/^---$/,/^---$/p' "$markdown_file" | head -1)
              
              # Check required fields: title, date, tags, type
              if ! grep -q "^title:" "$markdown_file"; then
                echo "  ❌ Missing 'title' in: $rel_path"
                ((ERRORS++))
              fi
              if ! grep -q "^date:" "$markdown_file"; then
                echo "  ❌ Missing 'date' in: $rel_path"
                ((ERRORS++))
              fi
              if ! grep -q "^tags:" "$markdown_file"; then
                echo "  ⚠️ Missing 'tags' in: $rel_path"
                ((WARNINGS++))
              fi
              if ! grep -q "^type:" "$markdown_file"; then
                echo "  ❌ Missing 'type' in: $rel_path"
                ((ERRORS++))
              fi
            else
              echo "  ❌ Missing frontmatter in: $rel_path"
              ((ERRORS++))
            fi
          done < <(find "$IMPORT_DIR" -type f -name "*.md" -print0)
          
          # Check folder structure
          echo ""
          echo "📁 Folder structure:"
          if [ -d "$IMPORT_DIR" ]; then
            find "$IMPORT_DIR" -type d | head -10 | sed 's|^|  |'
          fi
          
          # Summary
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Validation Summary:"
          echo "  Errors: $ERRORS"
          echo "  Warnings: $WARNINGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Validation failed with $ERRORS errors"
            exit 1
          else
            echo "✅ Validation passed"
          fi

      - name: Trigger site build
        run: |
          echo "Site build will be triggered by Astro"
          npm run build

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync content from Obsidian vault"
          commit_options: "--no-verify"
          file_pattern: "src/content/imported/**"
          skip_dirty_check: true
        if: always()
